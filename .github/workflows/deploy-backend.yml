name: Deploy Backend to DigitalOcean

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: backend

      - name: Run tests
        run: npm test
        working-directory: backend

      - name: Build
        run: npm run build
        working-directory: backend

      - name: Copy files to server
        run: |
          echo "${{ secrets.DO_SSH_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          tar -czf - -C backend dist package.json package-lock.json ecosystem.config.cjs | \
            ssh -i /tmp/deploy_key \
                -o StrictHostKeyChecking=no \
                -p ${{ secrets.DO_SSH_PORT || 22 }} \
                ${{ secrets.DO_SSH_USERNAME }}@${{ secrets.DO_SSH_HOST }} \
                "tar -xzf - -C /var/www/no-nikolaus"
          rm /tmp/deploy_key

      - name: Install and restart
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DO_SSH_HOST }}
          username: ${{ secrets.DO_SSH_USERNAME }}
          key: ${{ secrets.DO_SSH_KEY }}
          port: ${{ secrets.DO_SSH_PORT || 22 }}
          script: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            cd /var/www/no-nikolaus && npm ci --omit=dev
            pm2 reload ecosystem.config.cjs --env production || pm2 start ecosystem.config.cjs --env production
            pm2 save
